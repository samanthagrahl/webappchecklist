# Demo-App auf GitHub Pages (statisch, ohne Backend — localStorage-Modus).
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Statische Demo-Dateien vorbereiten
        run: |
          mkdir -p _site
          cp index.html app.js i18n.js styles.css logo.png _site/
          cp -r js vendor templates _site/
          touch _site/.nojekyll

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
