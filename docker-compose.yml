# Lokaler Stack zum Testen vor Hetzner-Deploy
# Start: docker compose up -d --build
# Migration: docker compose exec api npm run migrate
# Seed:     docker compose exec api npm run seed

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: immobiliencheck
      POSTGRES_PASSWORD: immobiliencheck_dev_password
      POSTGRES_DB: immobiliencheck
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immobiliencheck -d immobiliencheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3847:3847"
    volumes:
      - ./:/app:ro

volumes:
  pgdata:
